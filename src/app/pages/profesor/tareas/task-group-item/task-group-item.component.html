<div class="flex flex-col gap-2">

    <!-- Cabecera del grupo -->
    <div
      class="flex items-center overflow-hidden rounded-xl border border-gray-100 cursor-pointer select-none hover:opacity-85 transition-opacity"
      (click)="toggle()"
    >
      <!-- Banda de color -->
      <div class="w-1.5 self-stretch flex-shrink-0"
           [style.background]="color()">
      </div>
  
      <!-- Contenido de la cabecera -->
      <div class="flex flex-1 items-center justify-between px-4 py-3 bg-gray-50">
        <div class="flex items-center gap-2">
          <!-- Chevron -->
          <svg
            class="w-3.5 h-3.5 text-gray-400 transition-transform duration-200"
            [class.rotate-90]="isExpanded()"
            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd"
              d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z"
              clip-rule="evenodd"/>
          </svg>
          <!-- Nombre del grupo -->
          <span class="text-sm font-medium text-gray-700">{{ groupName() }}</span>
          <!-- Badge contador -->
          <span class="text-xs px-2 py-0.5 rounded-full bg-white border border-gray-200 text-gray-400">
            {{ tasks().length }}
          </span>
        </div>
      </div>
    </div>
  
    <!-- Lista de tareas del grupo -->
    <div *ngIf="isExpanded()"
         class="flex flex-col gap-2 pl-3">
      <app-task-list-item
        *ngFor="let task of tasks()"
        [task]="task"
        [color]="color()"
        [chipBg]="chipBg()"
      />
    </div>
  
  </div>
