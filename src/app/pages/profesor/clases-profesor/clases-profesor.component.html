<div class="w-full min-h-screen bg-slate-50 p-4 sm:p-6 lg:p-8 flex flex-col">
    
    <app-card-grid 
        [title]="'teacherClasses.title' | translate"
        [loadingMessage]="'teacherClasses.loading' | translate"
        [emptyMessage]="'teacherClasses.empty' | translate"
        [loading]="loading()"
        [errorMessage]="errorMessage()"
        [items]="asignaturasCards()"
        (actionClicked)="handleCardAction($event)"
        (secondaryActionClicked)="handleSecondaryCardAction($event)">
    </app-card-grid>

    <app-boton-atras></app-boton-atras>
</div>
