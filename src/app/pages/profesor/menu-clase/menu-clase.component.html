<div class="flex flex-col gap-6 p-6">

  <!-- Cabecera -->
  <div class="flex flex-col gap-1">
    <p class="text-xs text-gray-400 uppercase tracking-widest font-medium">{{ 'classMenu.youAreIn' | translate }}</p>
    <h1 class="text-xl font-semibold text-gray-800"></h1>
    <p class="text-sm text-gray-400"></p>
  </div>

  <!-- Opciones de navegación -->
  <div class="grid grid-cols-2 gap-4">

    <!-- Tareas -->
    <button
      (click)="navigateToTareas()"
      class="flex flex-col overflow-hidden rounded-2xl border border-gray-100 bg-white hover:border-gray-200 hover:shadow-sm transition-all cursor-pointer text-left"
    >
      <div class="h-1 w-full bg-indigo-400"></div>
      <div class="flex flex-col gap-2 p-5">
        <div class="flex items-center justify-center w-10 h-10 rounded-xl bg-indigo-50">
          <svg class="w-5 h-5 text-indigo-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"/>
            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
        </div>
        <div>
          <p class="text-sm font-medium text-gray-800">{{ 'classMenu.tasksTitle' | translate }}</p>
          <p class="text-xs text-gray-400 mt-0.5">{{ 'classMenu.tasksDesc' | translate }}</p>
        </div>
      </div>
    </button>

    <!-- Asistencias -->
    <button
      (click)="navigateToAsistencias()"
      class="flex flex-col overflow-hidden rounded-2xl border border-gray-100 bg-white hover:border-gray-200 hover:shadow-sm transition-all cursor-pointer text-left"
    >
      <div class="h-1 w-full bg-emerald-400"></div>
      <div class="flex flex-col gap-2 p-5">
        <div class="flex items-center justify-center w-10 h-10 rounded-xl bg-emerald-50">
          <svg class="w-5 h-5 text-emerald-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 00-3-3.87"/>
            <path d="M16 3.13a4 4 0 010 7.75"/>
          </svg>
        </div>
        <div>
          <p class="text-sm font-medium text-gray-800">{{ 'classMenu.justificationsTitle' | translate }}</p>
          <p class="text-xs text-gray-400 mt-0.5">{{ 'classMenu.justificationsDesc' | translate }}</p>
        </div>
      </div>
    </button>

  </div>

</div>
