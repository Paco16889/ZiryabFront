<div class="w-full bg-gray-50 flex flex-col items-center p-4 sm:p-6 lg:p-8 pt-8 sm:pt-12 pb-16">
  <div class="w-full max-w-2xl flex flex-col gap-6">

    <div class="text-center">
      <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-violet-600 to-indigo-600 tracking-tight mb-3">
        {{ 'teacherPages.classMenu.title' | translate }}
      </h1>
    </div>

    <!-- Opciones de navegación -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

      <!-- Tareas -->
      <button
        (click)="navigateToTareas()"
        class="flex flex-col overflow-hidden rounded-2xl border border-gray-100 bg-white hover:border-indigo-200 hover:shadow-md transition-all cursor-pointer text-left"
      >
        <div class="h-1 w-full bg-indigo-400"></div>
        <div class="flex flex-col gap-3 p-5 sm:p-6">
          <div class="flex items-center justify-center w-12 h-12 rounded-xl bg-indigo-50">
            <svg class="w-6 h-6 text-indigo-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9 11l3 3L22 4"/>
              <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
            </svg>
          </div>
          <div>
            <p class="text-base font-semibold text-gray-800">{{ 'teacherPages.classMenu.tasksTitle' | translate }}</p>
            <p class="text-sm text-gray-400 mt-0.5">{{ 'teacherPages.classMenu.tasksSubtitle' | translate }}</p>
          </div>
        </div>
      </button>

      <!-- Asistencias -->
      <button
        (click)="navigateToAsistencias()"
        class="flex flex-col overflow-hidden rounded-2xl border border-gray-100 bg-white hover:border-emerald-200 hover:shadow-md transition-all cursor-pointer text-left"
      >
        <div class="h-1 w-full bg-emerald-400"></div>
        <div class="flex flex-col gap-3 p-5 sm:p-6">
          <div class="flex items-center justify-center w-12 h-12 rounded-xl bg-emerald-50">
            <svg class="w-6 h-6 text-emerald-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 00-3-3.87"/>
              <path d="M16 3.13a4 4 0 010 7.75"/>
            </svg>
          </div>
          <div>
            <p class="text-base font-semibold text-gray-800">{{ 'teacherPages.classMenu.justificationsTitle' | translate }}</p>
            <p class="text-sm text-gray-400 mt-0.5">{{ 'teacherPages.classMenu.justificationsSubtitle' | translate }}</p>
          </div>
        </div>
      </button>

    </div>

    <app-boton-atras></app-boton-atras>
  </div>
</div>
