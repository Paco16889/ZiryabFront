<div class="w-full min-h-screen bg-slate-50 p-4 sm:p-6 lg:p-8 flex flex-col">
    <app-card-grid 
        [title]="'studentClasses.title' | translate"
        [loadingMessage]="'studentClasses.loading' | translate"
        [emptyMessage]="'studentClasses.empty' | translate"
        [loading]="loading()"
        [errorMessage]="errorMessage()"
        [items]="asignaturasCards()"
        (actionClicked)="handleCardAction($event)">
    </app-card-grid>

    <div class="mt-auto flex justify-center pb-4">
        <app-boton-atras></app-boton-atras>
    </div>
</div>
