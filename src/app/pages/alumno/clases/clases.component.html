<div class="w-full min-h-screen bg-slate-50 p-4 sm:p-6 lg:p-8 flex flex-col">
    <app-card-grid 
        [title]="'studentPages.classes.title' | translate"
        [loadingMessage]="'studentPages.classes.loading' | translate"

    <app-boton-atras></app-boton-atras>
