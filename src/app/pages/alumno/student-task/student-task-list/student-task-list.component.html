<div class="flex flex-col gap-6 p-4">

  @if (studentTaskService.loading()) {
<p class="text-center text-gray-400 text-sm">{{ 'studentPages.tasks.loading' | translate }}</p>
  }

  @if (!studentTaskService.loading() && studentTaskService.studentTasks().length === 0) {
    <p class="text-center text-gray-400 text-sm">{{ 'studentPages.tasks.empty' | translate }}</p>
  }

  @for (group of groupedTasks(); track group.groupName) {
    <app-student-task-group
      [groupName]="group.groupName"
      [studentTasks]="group.tasks"
    />
  }

</div>
