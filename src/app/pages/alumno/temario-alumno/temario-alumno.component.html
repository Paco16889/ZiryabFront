<div class="w-full max-w-2xl mx-auto p-6 font-sans text-slate-600 bg-white h-auto overflow-hidden">
    <div class="text-center mb-10 mt-2 relative">
        <h1
            class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-violet-600 to-indigo-600 tracking-tight mb-5 pb-3 leading-normal">
            Programación
        </h1>
    </div>

    <div class="flex flex-col gap-5 pb-6">
        @for (unidad of unidades; track unidad.id; let i = $index) {
        <div class="rounded-3xl border-2 transition-all duration-300 overflow-hidden" [ngClass]="{
            'bg-blue-50/70 border-blue-100': i % 4 === 0,
            'bg-fuchsia-50/70 border-fuchsia-100': i % 4 === 1,
            'bg-emerald-50/70 border-emerald-100': i % 4 === 2,
            'bg-amber-50/70 border-amber-100': i % 4 === 3,
            'shadow-xl scale-[1.02] z-10': unidad.abierta,
            'hover:shadow-md hover:scale-[1.01]': !unidad.abierta
            }">

            <button (click)="toggleUnidad(unidad.id)"
                class="w-full flex items-center justify-between p-5 cursor-pointer focus:outline-none group select-none">

                <div class="flex items-center gap-5">
                    <div class="flex-shrink-0 w-14 h-14 rounded-2xl flex items-center justify-center text-xl font-bold transition-all duration-300 border-2 shadow-sm"
                        [class]="unidad.abierta 
                        ? 'bg-indigo-600 text-white border-indigo-600 shadow-indigo-200 scale-110' 
                        : 'bg-white text-slate-400 border-white/50 group-hover:border-white group-hover:scale-105'">
                        {{ unidad.id }}
                    </div>

                    <div class="text-left">
                        <h3 class="font-bold text-lg text-slate-700/90 leading-snug">
                            {{ unidad.titulo }}
                        </h3>
                        <span
                            class="inline-block text-[10px] font-bold uppercase tracking-wider px-2 py-1 rounded-md mt-1 bg-white/60 text-slate-500">
                            {{ unidad.temas.length }} Archivos
                        </span>
                    </div>
                </div>

                <div class="w-10 h-10 flex items-center justify-center rounded-full transition-all duration-300 bg-white/50 shrink-0"
                    [class.rotate-180]="unidad.abierta" [class.text-indigo-600]="unidad.abierta"
                    [class.text-slate-400]="!unidad.abierta">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 9l6 6 6-6" />
                    </svg>
                </div>
            </button>

            @if (unidad.abierta) {
            <div class="p-2 pb-6 animate-fadeIn border-t border-white/40">
                <ul class="space-y-1 ml-4 md:ml-24 mr-4">
                    @for (tema of unidad.temas; track tema) {
                    <li
                        class="flex items-center gap-3 p-3 rounded-xl hover:bg-white/60 transition-colors cursor-default group/tema">
                        <img src="https://raw.githubusercontent.com/Tarikul-Islam-Anik/Animated-Fluent-Emojis/master/Emojis/Symbols/Check%20Mark%20Button.png"
                            alt="Check" class="w-5 h-5 opacity-80 group-hover/tema:scale-110 transition-transform" />
                        <span
                            class="text-slate-600 font-medium text-sm group-hover/tema:text-indigo-600 transition-colors">
                            {{ tema }}
                        </span>
                    </li>
                    }
                </ul>
            </div>
            }
        </div>
        }
    </div>
</div>
<app-boton-atras></app-boton-atras>
