<app-generic-list-item
  [item]="teacher"
  [config]="teacherConfig"
  [detailTemplate]="detailTemplate"
  (itemUpdated)="onTeacherUpdated($event)"
  (itemDeleted)="onTeacherDeleted($event)">
</app-generic-list-item>

<!-- Template para el detalle -->
<ng-template #detailTemplate let-teacher>
  <app-teacher-view-detail [teacher]="teacher"></app-teacher-view-detail>
</ng-template>
