<div class="flex m-2 bg-purple-300 rounded justify-between items-center px-1">
    <p>{{teacher.surname}}, {{teacher.ndSurname}}</p>
    <p>{{teacher.name}}</p>
    <p>{{teacher.email}}</p>
    <div class="flex gap-1 py-1">
    <app-boton-edit [id]="teacher.id" (showEdit)="toggleEdit($event)"></app-boton-edit>
    <app-boton-delete [id]="teacher.id" (showDelete)="toggleDelete($event)"></app-boton-delete>
    <app-boton-viewdetail [id]="teacher.id" (showDetail)="toggleDetail($event)"></app-boton-viewdetail>
    </div>
    
</div>

<div>
  @if(selectedTeacher){
    
        <app-teacher-view-detail [teacher]="selectedTeacher"></app-teacher-view-detail>
}


  @if (teacherToEdit) {
    <app-teacher-edit-modal
      [teacher]="teacherToEdit"
      (closeModal)="closeEditModal()"
      (teacherUpdated)="onTeacherUpdated($event)">
    </app-teacher-edit-modal>
  }
  
 @if(teacherToDelete){
        <app-generic-delete-modal
            entityType="el profesor"
            [entityName]="teacherToDelete.name"
            [entityId]="teacherToDelete.id"
            [deleteFunction]="deleteTeacherFn"
            (closeModal)="closeDeleteModal()"
            (entityDeleted)="onTeacherDeleted($event)">
        </app-generic-delete-modal>
    }
</div>
