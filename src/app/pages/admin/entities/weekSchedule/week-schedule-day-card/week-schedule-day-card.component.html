<section
  class="flex flex-col overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm dark:border-slate-600 dark:bg-slate-900"
  [attr.aria-labelledby]="dayHeadingId()"
>
  <header
    class="border-b border-slate-200 bg-slate-50 px-4 py-3 dark:border-slate-700 dark:bg-slate-800/80"
  >
    <h2 [id]="dayHeadingId()" class="text-base font-semibold text-slate-900 dark:text-slate-50">
      {{ dayNameTranslateKey() | translate }}
    </h2>
  </header>
  <div class="flex flex-col gap-2 p-3">
    <ng-content />
  </div>
</section>
