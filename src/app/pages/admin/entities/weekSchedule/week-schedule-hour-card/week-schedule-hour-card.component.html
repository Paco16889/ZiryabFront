<article
  class="rounded-lg border border-slate-200 bg-white shadow-sm dark:border-slate-600 dark:bg-slate-900"
  [attr.aria-label]="rangeLabel()"
>
  <div
    class="flex items-center justify-between gap-2 border-b border-slate-100 px-3 py-2 dark:border-slate-700"
  >
    <span class="font-mono text-sm font-medium text-slate-800 dark:text-slate-100">
      {{ startTime() }} – {{ finishTime() }}
    </span>
  </div>
  <div class="min-h-10 px-3 py-2 text-sm text-slate-700 dark:text-slate-200">
    <ng-content />
  </div>
</article>
