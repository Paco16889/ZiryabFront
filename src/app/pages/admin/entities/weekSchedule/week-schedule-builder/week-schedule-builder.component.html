<div class="max-w-7xl mx-auto">
  <h1 class="text-2xl font-bold text-gray-900 dark:text-purple-100 mb-6">{{ 'weekScheduleBuilder.title' | translate }}</h1>

  @if (gridSaveMessage()) {
    <div
      class="mb-4 rounded-lg border border-green-300 bg-green-50 px-4 py-3 text-sm text-green-800 dark:border-green-800 dark:bg-green-950/30 dark:text-green-200"
      role="status"
    >
      {{ gridSaveMessage() }}
    </div>
  }

  <div
    class="flex flex-wrap gap-2 mb-6"
    role="tablist"
    [attr.aria-label]="'weekScheduleBuilder.modeLabel' | translate"
  >
    <button
      type="button"
      role="tab"
      [attr.aria-selected]="builderMode() === 'create'"
      (click)="setBuilderMode('create')"
      class="px-4 py-2 rounded-md text-sm font-medium border transition-colors"
      [class.bg-purple-600]="builderMode() === 'create'"
      [class.text-white]="builderMode() === 'create'"
      [class.border-purple-600]="builderMode() === 'create'"
      [class.bg-white]="builderMode() !== 'create'"
      [class.dark:bg-gray-800]="builderMode() !== 'create'"
      [class.text-gray-800]="builderMode() !== 'create'"
      [class.dark:text-gray-200]="builderMode() !== 'create'"
      [class.border-gray-300]="builderMode() !== 'create'"
      [class.dark:border-gray-600]="builderMode() !== 'create'"
    >
      {{ 'weekScheduleBuilder.modeCreate' | translate }}
    </button>
    <button
      type="button"
      role="tab"
      [attr.aria-selected]="builderMode() === 'grid'"
      (click)="setBuilderMode('grid')"
      class="px-4 py-2 rounded-md text-sm font-medium border transition-colors"
      [class.bg-purple-600]="builderMode() === 'grid'"
      [class.text-white]="builderMode() === 'grid'"
      [class.border-purple-600]="builderMode() === 'grid'"
      [class.bg-white]="builderMode() !== 'grid'"
      [class.dark:bg-gray-800]="builderMode() !== 'grid'"
      [class.text-gray-800]="builderMode() !== 'grid'"
      [class.dark:text-gray-200]="builderMode() !== 'grid'"
      [class.border-gray-300]="builderMode() !== 'grid'"
      [class.dark:border-gray-600]="builderMode() !== 'grid'"
    >
      {{ 'weekScheduleBuilder.modeGrid' | translate }}
    </button>
  </div>

  <div [class.hidden]="builderMode() !== 'create'">
    <app-week-schedule-create-template
      [preselectClassKey]="createPreselectClassKey()"
      (templateCreated)="onTemplateCreated($event)"
    />
  </div>
  <div [class.hidden]="builderMode() !== 'grid'">
    <app-week-schedule-grid-builder
      [embedded]="true"
      [preselectClassKey]="gridPreselectClassKey()"
      [preselectClass]="gridPreselectClass()"
      [listRefreshToken]="gridListRefreshToken()"
      (scheduleSaved)="onGridScheduleSaved()"
    />
  </div>
</div>
