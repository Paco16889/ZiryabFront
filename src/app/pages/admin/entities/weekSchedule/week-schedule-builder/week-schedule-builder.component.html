<div class="max-w-7xl mx-auto">
  <div class="flex items-center mb-6">
    <button
      type="button"
      (click)="onCancel()"
      class="mr-4 text-gray-600 hover:text-gray-900"
    >
      ← {{ 'common.buttons.back' | translate }}
    </button>
    <h1 class="text-2xl font-bold">{{ 'weekScheduleBuilder.title' | translate }}</h1>
  </div>

  <div
    class="flex flex-wrap gap-2 mb-6"
    role="tablist"
    [attr.aria-label]="'weekScheduleBuilder.modeLabel' | translate"
  >
    <button
      type="button"
      role="tab"
      [attr.aria-selected]="builderMode() === 'simple'"
      (click)="setBuilderMode('simple')"
      class="px-4 py-2 rounded-md text-sm font-medium border transition-colors"
      [class.bg-purple-600]="builderMode() === 'simple'"
      [class.text-white]="builderMode() === 'simple'"
      [class.border-purple-600]="builderMode() === 'simple'"
      [class.bg-white]="builderMode() !== 'simple'"
      [class.text-gray-800]="builderMode() !== 'simple'"
      [class.border-gray-300]="builderMode() !== 'simple'"
    >
      {{ 'weekScheduleBuilder.modeSimple' | translate }}
    </button>
    <button
      type="button"
      role="tab"
      [attr.aria-selected]="builderMode() === 'grid'"
      (click)="setBuilderMode('grid')"
      class="px-4 py-2 rounded-md text-sm font-medium border transition-colors"
      [class.bg-purple-600]="builderMode() === 'grid'"
      [class.text-white]="builderMode() === 'grid'"
      [class.border-purple-600]="builderMode() === 'grid'"
      [class.bg-white]="builderMode() !== 'grid'"
      [class.text-gray-800]="builderMode() !== 'grid'"
      [class.border-gray-300]="builderMode() !== 'grid'"
    >
      {{ 'weekScheduleBuilder.modeGrid' | translate }}
    </button>
  </div>

  @if (builderMode() === 'simple') {
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow space-y-4">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
        <app-week-schedule-builder-selects
          [form]="form"
          (selectionsChanged)="clearSaveError()"
        />

        <app-week-schedule-builder-slot-form [form]="form" [weekdays]="weekdays" />

        @if (saveError()) {
          <p class="text-sm text-red-600">{{ 'weekScheduleBuilder.saveError' | translate }}</p>
        }

        <div class="pt-2">
          <button
            type="submit"
            [disabled]="saving() || form.invalid"
            class="px-4 py-2 bg-purple-600 text-white rounded-md disabled:opacity-50"
          >
            @if (saving()) {
              {{ 'weekScheduleBuilder.saving' | translate }}
            } @else {
              {{ 'weekScheduleBuilder.submit' | translate }}
            }
          </button>
        </div>
      </form>
    </div>
  } @else {
    <app-week-schedule-grid-builder
      (cancelCreate)="onCancel()"
      (scheduleSaved)="onGridScheduleSaved()"
    />
  }
</div>
