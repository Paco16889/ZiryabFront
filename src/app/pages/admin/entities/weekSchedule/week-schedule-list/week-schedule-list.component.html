<div class="p-4">
  
@if(!showCreateForm){
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold">{{ 'entities.weekSchedule.title' | translate }}</h1>
      <app-boton-create 
      label="{{ 'lists.schedules.createButton' | translate }}"
      (clickAction)="openCreateForm()"> 
      </app-boton-create>
    </div>

    @for (sch of schedules; track sch.id){
        <app-week-schedule-list-item [schedule]="sch"></app-week-schedule-list-item>
    }
}


  @if(showCreateForm){
    <app-week-schedule-builder
      (cancelCreate)="closeCreateForm()"
      (scheduleCreated)="onScheduleCreated()">
    </app-week-schedule-builder>
  }



</div>
