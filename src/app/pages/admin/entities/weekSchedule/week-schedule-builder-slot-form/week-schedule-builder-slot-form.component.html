<div class="space-y-4" [formGroup]="form()">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1">{{
      'weekScheduleBuilder.weekDay' | translate
    }}</label>
    <select
      formControlName="weekDay"
      class="w-full border border-gray-300 rounded-md px-3 py-2"
    >
      @for (d of weekdays(); track d) {
        <option [ngValue]="d">
          {{ ('weekScheduleBuilder.days.' + d) | translate }}
        </option>
      }
    </select>
  </div>

  <div class="grid grid-cols-2 gap-3">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{
        'weekScheduleBuilder.startTime' | translate
      }}</label>
      <input
        type="time"
        formControlName="startTime"
        class="w-full border border-gray-300 rounded-md px-3 py-2"
      />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{
        'weekScheduleBuilder.endTime' | translate
      }}</label>
      <input
        type="time"
        formControlName="finishTime"
        class="w-full border border-gray-300 rounded-md px-3 py-2"
      />
    </div>
  </div>

  @if (timeOrderInvalid()) {
    <p class="text-sm text-red-600" role="alert">
      {{ 'weekScheduleBuilder.timeOrderError' | translate }}
    </p>
  }
</div>
