<!-- course-create-form.component.html -->
<div class="max-w-2xl mx-auto">
  <div class="flex items-center mb-6">
    <button 
      (click)="onCancel()"
      class="mr-4 text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-gray-100">
      ← {{ 'common.buttons.back' | translate }}
    </button>
<h1 class="text-2xl font-bold text-gray-900 dark:text-purple-100">{{ 'adminPages.forms.course.title' | translate }}</h1>
  </div>

  <div class="bg-white dark:bg-gray-900 dark:border dark:border-gray-800 p-6 rounded-lg shadow">
    <form [formGroup]="createForm" (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="block text-gray-700 dark:text-gray-300 font-medium mb-2">
{{ 'adminPages.forms.course.nameLabel' | translate }}
        </label>
        <input 
          formControlName="name"
          type="text"
          class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 dark:text-gray-100 focus:outline-none focus:ring-2 focus:ring-purple-500 dark:focus:ring-purple-400"
          [placeholder]="'forms.courseNamePlaceholder' | translate"
        />
        @if(createForm.get('name')?.invalid && createForm.get('name')?.touched){
            <span class="text-red-500 text-sm mt-1">
            {{ 'common.validation.nameRequired' | translate }}
            </span>
        }
      </div>

      @if(errorMessage){
        <div class="mb-4 p-3 bg-red-100 dark:bg-red-950/30 border border-red-400 dark:border-red-800 rounded text-red-700 dark:text-red-300">
        {{ errorMessage }}
        </div>
      }

      <div class="flex justify-end gap-3">
        <button 
          type="button"
          (click)="onCancel()"
          [disabled]="isCreating"
          class="px-6 py-2 bg-gray-300 rounded-lg hover:bg-gray-400 disabled:opacity-50">
          {{ 'common.buttons.cancel' | translate }}
        </button>
        <button 
          type="submit"
          [disabled]="createForm.invalid || isCreating"
          class="px-6 py-2 bg-purple-600 dark:bg-purple-700 text-white rounded-lg hover:bg-purple-700 dark:hover:bg-purple-600 
                 disabled:bg-gray-300 dark:disabled:bg-gray-600 disabled:cursor-not-allowed">
{{ isCreating ? ('adminPages.forms.common.creating' | translate) : ('adminPages.forms.course.submit' | translate) }}
        </button>
      </div>
    </form>
  </div>
</div>
