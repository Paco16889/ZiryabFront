<div class="max-w-7xl mx-auto p-4">
  <div class="flex items-center mb-6">
    <button
      type="button"
      class="mr-4 text-gray-600 hover:text-gray-900"
      (click)="onBack()"
    >
      ← {{ 'common.buttons.back' | translate }}
    </button>
    <h1 class="text-2xl font-bold text-gray-900">
      {{ 'courseAssignments.grid.title' | translate }}
    </h1>
  </div>

  <p class="text-sm text-gray-700 mb-4">
    {{
      'courseAssignments.grid.subtitle'
        | translate
          : {
              course: context().courseName,
              grade: gradeDisplay()
            }
    }}
  </p>

  <p class="text-sm text-amber-800 bg-amber-50 border border-amber-200 rounded-md px-3 py-2">
    {{ 'courseAssignments.grid.pendingImplementation' | translate }}
  </p>
</div>
