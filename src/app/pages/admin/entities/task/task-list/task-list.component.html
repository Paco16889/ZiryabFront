<div class="p-4">
  @if (!showCreateForm) {
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-purple-100">{{ 'entities.task.title' | translate }}</h1>
      <app-boton-create
        [label]="'lists.tasks.createButton' | translate"
        (clickAction)="openCreateForm()"
      />
    </div>

    @for (task of tasks; track task.id) {
      <app-task-list-item [task]="task" />
    }
  }

  @if (showCreateForm) {
    <app-task-create-form
      (cancelCreate)="closeCreateForm()"
      (taskCreated)="onTaskCreated()"
    />
  }
</div>
