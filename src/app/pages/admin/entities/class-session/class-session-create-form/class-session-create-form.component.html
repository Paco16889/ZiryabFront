<div class="max-w-2xl mx-auto">
  <div class="flex items-center mb-6">
    <button type="button" class="mr-4 text-gray-600 hover:text-gray-900" (click)="onCancel()">
      ← {{ 'common.buttons.back' | translate }}
    </button>
    <h1 class="text-2xl font-bold">{{ 'lists.classSessions.createTitle' | translate }}</h1>
  </div>

  <div class="bg-white p-6 rounded-lg shadow">
    <form [formGroup]="createForm" (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label class="block text-gray-700 font-medium mb-2">{{ 'lists.classSessions.fields.schedule' | translate }}</label>
        <select formControlName="idSchedule" class="w-full px-4 py-2 border rounded-lg" [disabled]="loadingSchedules()">
          <option [ngValue]="null">{{ 'lists.classSessions.fields.schedulePlaceholder' | translate }}</option>
          @for (opt of scheduleOptions(); track opt.value) {
            <option [ngValue]="opt.value">{{ opt.label }}</option>
          }
        </select>
      </div>
      <div class="mb-4">
        <label class="block text-gray-700 font-medium mb-2">{{ 'lists.classSessions.fields.date' | translate }}</label>
        <input formControlName="date" type="date" class="w-full px-4 py-2 border rounded-lg" />
      </div>
      <div class="mb-4">
        <label class="block text-gray-700 font-medium mb-2">{{ 'lists.classSessions.fields.status' | translate }}</label>
        <input formControlName="status" type="text" class="w-full px-4 py-2 border rounded-lg" />
      </div>
      <div class="mb-4">
        <label class="block text-gray-700 font-medium mb-2">{{ 'lists.classSessions.fields.appointments' | translate }}</label>
        <textarea formControlName="appointments" rows="2" class="w-full px-4 py-2 border rounded-lg"></textarea>
      </div>
      @if (errorMessage) {
        <div class="mb-4 p-3 bg-red-100 border border-red-400 rounded text-red-700">{{ errorMessage }}</div>
      }
      <div class="flex justify-end gap-3">
        <button type="button" (click)="onCancel()" [disabled]="isCreating" class="px-6 py-2 bg-gray-300 rounded-lg">
          {{ 'common.buttons.cancel' | translate }}
        </button>
        <button type="submit" [disabled]="createForm.invalid || isCreating" class="px-6 py-2 bg-green-500 text-white rounded-lg disabled:bg-gray-300">
          {{ isCreating ? ('lists.classSessions.creating' | translate) : ('lists.classSessions.createButton' | translate) }}
        </button>
      </div>
    </form>
  </div>
</div>
