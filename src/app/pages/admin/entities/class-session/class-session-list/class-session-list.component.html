<div class="p-4">
  @if (!showCreateForm) {
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold">{{ 'entities.classSession.title' | translate }}</h1>
      <app-boton-create
        [label]="'lists.classSessions.createButton' | translate"
        (clickAction)="openCreateForm()"
      />
    </div>
    @for (session of classSessions; track session.id) {
      <app-class-session-list-item [classSession]="session" />
    }
  }
  @if (showCreateForm) {
    <app-class-session-create-form
      (cancelCreate)="closeCreateForm()"
      (sessionCreated)="onSessionCreated()"
    />
  }
</div>
