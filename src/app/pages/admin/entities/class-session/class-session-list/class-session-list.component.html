<div class="p-4">
  @if (!showCreateForm) {
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold">{{ 'lists.classSessions.title' | translate }}</h1>
      <app-boton-create
        [label]="'lists.classSessions.createButton' | translate"
        (clickAction)="openCreateForm()">
      </app-boton-create>
    </div>
    @for (classSession of classSessions; track classSession.id) {
      <app-class-session-list-item [classSession]="classSession"></app-class-session-list-item>
    }
  }

  @if (showCreateForm) {
    <app-class-session-create-form
      (cancelCreate)="closeCreateForm()"
      (sessionCreated)="onSessionCreated()">
    </app-class-session-create-form>
  }
</div>
