<button
  type="button"
  class="text-gray-600 hover:text-gray-900 dark:text-gray-400 dark:hover:text-gray-100"
  (click)="cancelClose.emit()"
>
  ← {{ 'common.buttons.back' | translate }}
</button>

<div class="mt-4 max-w-2xl space-y-4">
  <h2 class="text-xl font-bold text-gray-900 dark:text-purple-100">
    {{ 'lists.substitutions.closeTitle' | translate }}
  </h2>

  @if (activeSubstitutions().length === 0) {
    <p class="text-sm text-gray-500 dark:text-gray-400">
      {{ 'lists.substitutions.closeEmpty' | translate }}
    </p>
    <button
      type="button"
      class="rounded-md border border-purple-300 px-4 py-2 text-sm font-medium text-purple-800 dark:border-purple-600 dark:text-purple-200"
      (click)="cancelClose.emit()"
    >
      {{ 'common.buttons.back' | translate }}
    </button>
  } @else {
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4 rounded-2xl border border-gray-100 bg-white p-5 dark:border-gray-800 dark:bg-gray-900">
      <div>
        <label class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-300" for="sub-close-select">
          {{ 'lists.substitutions.closeSelectLabel' | translate }}
        </label>
        <select
          id="sub-close-select"
          formControlName="idSubstitution"
          class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100"
        >
          <option [ngValue]="null" disabled>{{ 'common.placeholders.selectOption' | translate }}</option>
          @for (item of activeSubstitutions(); track item.id) {
            <option [ngValue]="item.id">{{ substitutionLabel(item) }}</option>
          }
        </select>
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-gray-700 dark:text-gray-300" for="sub-close-date">
          {{ 'lists.substitutions.closeEndDate' | translate }}
        </label>
        <input
          id="sub-close-date"
          type="date"
          formControlName="endDate"
          class="w-full rounded-lg border border-gray-200 px-3 py-2 text-sm dark:border-gray-600 dark:bg-gray-800 dark:text-gray-100"
        />
      </div>

      @if (errorMessage(); as err) {
        <p class="text-sm text-red-600">
          {{ err.startsWith('lists.') ? (err | translate) : err }}
        </p>
      }

      <div class="flex flex-wrap gap-2">
        <button
          type="submit"
          class="rounded-md bg-purple-600 px-4 py-2 text-sm font-semibold text-white hover:bg-purple-700 disabled:opacity-50"
          [disabled]="saving()"
        >
          @if (saving()) {
            {{ 'common.messages.saving' | translate }}
          } @else {
            {{ 'lists.substitutions.closeConfirm' | translate }}
          }
        </button>
        <button
          type="button"
          class="rounded-md border border-gray-300 px-4 py-2 text-sm dark:border-gray-600"
          (click)="cancelClose.emit()"
        >
          {{ 'common.buttons.cancel' | translate }}
        </button>
      </div>
    </form>
  }
</div>
