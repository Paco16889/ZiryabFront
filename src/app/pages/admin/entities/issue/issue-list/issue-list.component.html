@if (variant() === 'standalone') {
  <app-boton-atras />
}

<div [class]="variant() === 'standalone' ? 'p-4 max-w-3xl mx-auto' : 'p-4'">
  @if (!showCreateForm) {
    <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
      <h1 class="text-2xl font-bold">{{ 'entities.issue.title' | translate }}</h1>
      @if (canCreate()) {
        <app-boton-create
          [label]="'lists.issues.createButton' | translate"
          (clickAction)="openCreateForm()"
        />
      }
    </div>

    @if (issues.length === 0) {
      <p class="text-center text-gray-500 py-12">{{ 'lists.issues.empty' | translate }}</p>
    }

    @for (issue of issues; track issue.id) {
      <app-issue-list-item [issue]="issue" />
    }
  }

  @if (showCreateForm) {
    <app-issue-create-form
      (cancelCreate)="closeCreateForm()"
      (issueCreated)="onIssueCreated()"
    />
  }
</div>
