<div class="p-4">
  @if (!showCreateForm) {
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-purple-100">{{ 'entities.assistance.title' | translate }}</h1>
      <app-boton-create [label]="'lists.assistances.createButton' | translate" (clickAction)="openCreateForm()" />
    </div>
    @for (a of assistances; track a.id) {
      <app-assistance-list-item [assistance]="a" />
    }
  }
  @if (showCreateForm) {
    <app-assistance-create-form
      (cancelCreate)="closeCreateForm()"
      (assistanceCreated)="onAssistanceCreated()"
    />
  }
</div>
