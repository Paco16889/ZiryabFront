<app-generic-list-item
  [item]="course"
  [config]="courseConfig"
  [detailTemplate]="detailTemplate"
  (itemUpdated)="onCourseUpdated($event)"
  (itemDeleted)="onCourseDeleted($event)">
</app-generic-list-item>

<!-- Template para el detalle -->
<ng-template #detailTemplate let-course>
  <app-course-view-detail [course]="course"></app-course-view-detail>
</ng-template>
