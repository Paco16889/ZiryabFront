<div class="max-w-2xl mx-auto">
  <div class="flex items-center mb-6">
    <button 
      (click)="onCancel()"
      class="mr-4 text-gray-600 hover:text-gray-900">
      ← Volver
    </button>
    <h1 class="text-2xl font-bold">Matricular Alumno</h1>
  </div>

  <div class="bg-white p-6 rounded-lg shadow">

    <!-- Selector tipo alumno -->
     @if (mode === 'new' || mode === 'existing') {
       <app-student-mode-selector
      (modeSelected)="setMode($event)">

      </app-student-mode-selector>
     }
  

    <!-- FORMULARIO: ALUMNO NUEVO -->
    @if(mode === 'new'){
      <div class="border-t pt-6">
        <!-- aquí irá tu student-create-form real -->
        <p class="text-gray-600 mb-4">
          Introduce los datos del nuevo alumno
        </p>
        <app-student-create-form
        (cancelCreate)="onCancelStudentCreate()">

        </app-student-create-form>

        <!-- placeholder -->
        <!-- aquí luego metes el formGroup del alumno -->
      </div>
    }

    <!-- FORMULARIO: ALUMNO EXISTENTE -->
    @if(mode === 'existing'){
      <div class="border-t pt-6">
        <p class="text-gray-600 mb-4">
          Selecciona un alumno existente para matricular
        </p>
        <app-student-selector
         [students]="students"
         (cancelSelection)="onCancel()"
         (studentSelected)="onStudentSelected($event)">

        </app-student-selector>
        <!-- placeholder -->
        <!-- aquí luego irá el select de alumnos + curso -->
      </div>
    }

    @if(mode === 'set-registration'){
  <div class="border-t pt-6">
    <app-set-registration
    [students]="students" ></app-set-registration>
  </div>
}


  </div>
</div>
