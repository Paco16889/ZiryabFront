<div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-lg p-6 w-96">
    <h3 class="text-xl font-bold mb-4">Editar Asignatura</h3>
    
    <form [formGroup]="editForm" (ngSubmit)="onSubmit()">
      
      <!-- Nombre -->
      <div class="mb-4">
        <label class="block text-gray-700 mb-2">Nombre de la asignatura</label>
        <input 
          formControlName="name"
          type="text"
          class="w-full px-3 py-2 border rounded"
          placeholder="Nombre de la asignatura"
        />
        @if(editForm.get('name')?.invalid && editForm.get('name')?.touched){
             <span 
              class="text-red-500 text-sm">
          El nombre es requerido
        </span>
        }
        
      </div>

      <!-- Dropdown de ciclos -->
      <div class="mb-4">
        <label class="block text-gray-700 mb-2">Ciclo</label>
        
        @if(isLoadingCourses){
             <div class="text-gray-500">
          Cargando ciclos...
        </div>
        }
       
        @if(!isLoadingCourses){
            <select 
        
          formControlName="idCourse"
          class="w-full px-3 py-2 border rounded">
          <option value="">Selecciona un ciclo</option>
            @for(course of courses; track course.id){
                <option [ngValue]="course.id">
            {{ course.name }}
          </option>
            }
          
        </select>
        }
        
        @if(editForm.get('idCourse')?.invalid && editForm.get('idCourse')?.touched){
            <span 
              class="text-red-500 text-sm">
            Debes seleccionar un ciclo
            </span>
        }
        
      </div>

      <div class="flex justify-end gap-2">
        <button 
          type="button"
          (click)="onClose()"
          class="px-4 py-2 bg-gray-300 rounded hover:bg-gray-400">
          Cancelar
        </button>
        <button 
          type="submit"
          [disabled]="editForm.invalid"
          class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600 disabled:bg-gray-300">
          Guardar
        </button>
      </div>
    </form>
  </div>
</div>
