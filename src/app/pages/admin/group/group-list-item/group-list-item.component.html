<app-generic-list-item
  [item]="group"
  [config]="groupConfig"
  [detailTemplate]="detailTemplate"
  (itemUpdated)="onGroupUpdated($event)"
  (itemDeleted)="onGroupDeleted($event)">
</app-generic-list-item>

<!-- Template para el detalle -->
<ng-template #detailTemplate let-group>
  <app-group-view-detail [group]="group"></app-group-view-detail>
</ng-template>
