
<div class="p-4">
  @if(!showCreateForm){
    <div class="flex justify-between items-center mb-4">
      <h1 class="text-2xl font-bold">{{'entities.group.title' | translate }}</h1>
      <app-boton-create 
      label="{{'lists.groups.createButton' | translate}}"
      (clickAction)="openCreateForm()"> 
      </app-boton-create>
    </div>

    @for (gro of groups; track gro.id){
    <app-group-list-item [group]="gro" (groupUpdated)="onGroupUpdated($event.id)"></app-group-list-item>
    }
  }
  
@if(showCreateForm){
    <app-group-create-form 
      (cancelCreate)="closeCreateForm()" 
      (groupCreated)="onGroupCreated()">
    </app-group-create-form>
  } 


</div>
