@if(isOpen){
    <div (click)="close.emit()" class="fixed inset-0 bg-black bg-opacity-40 z-50 flex justify-center items-start p-4 pt-20">
        <div (click)="$event.stopPropagation()" 
                class="w-full max-w-xs bg-white rounded-2xl shadow-2xl overflow-hidden border-t-4 border-purple-500 mr-2">
            <div class="bg-purple-50 p-6 flex flex-col items-center border-b border-purple-100">
                <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center border-4 border-purple-200 shadow-sm mb-3">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                    </svg>
                </div>
                <h3 class="text-xl font-extrabold text-gray-800 text-center">{{ userName }}</h3>
                <span class="mt-1 px-3 py-1 bg-purple-200 text-purple-800 text-xs font-bold rounded-full uppercase tracking-wide">
                    {{ userRole | translate }} 
                </span>
            </div>
            <div class="p-4 space-y-3">
                <button (click)="onLogout()" 
                        [disabled]="isLoggingOut"
                        [class.opacity-50]="isLoggingOut"
                        [class.cursor-not-allowed]="isLoggingOut"
                        class="w-full flex items-center justify-center space-x-2 py-3 px-4 bg-red-50 text-red-600 font-bold rounded-xl hover:bg-red-100 transition duration-200 group disabled:hover:bg-red-50">
                    
                    @if(isLoggingOut) {
                        <!-- Spinner de carga -->
                        <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span>{{ 'perfil.logginOut' | translate }}</span>
                    } @else {
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                        <span>{{ 'perfil.logout' | translate }}</span>
                    }
                </button>
            </div>
        </div>
    </div>
    }
