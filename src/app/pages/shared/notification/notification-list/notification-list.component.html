@if (panelService.isOpen()) {
  <div class="absolute right-0 top-14 w-80 bg-white rounded-xl shadow-lg border border-gray-200 z-50 overflow-hidden">

    <div class="flex items-center justify-between px-4 py-3 border-b border-gray-100">
      <span class="text-sm font-semibold text-gray-800">{{ 'sharedPages.notifications.title' | translate }}</span>
      @if (service.hasUnread()) {
        <button
          class="text-xs text-blue-500 hover:text-blue-700 font-medium"
          (click)="markAllAsRead()"
        >
          {{ 'sharedPages.notifications.markAllRead' | translate }}
        </button>
      }
    </div>

    <div class="max-h-96 overflow-y-auto divide-y divide-gray-100">
      @if (service.notifications().length === 0) {
        <p class="text-sm text-gray-400 text-center py-8">{{ 'sharedPages.notifications.empty' | translate }}</p>
      }
      @for (notification of service.notifications(); track notification.id) {
        <app-notification-list-item
          [notification]="notification"
          (notificationClick)="onItemClicked($event)"
        />
      }
    </div>

  </div>
}
