<div class="w-full min-h-screen bg-gray-50 p-6 pt-10 pb-24">
  <div class="max-w-6xl mx-auto flex flex-col h-full">
    <h1 class="text-4xl font-extrabold text-gray-800 mb-2">{{ 'calendario.title' | translate }}</h1>
    <p class="text-gray-500 mb-6">{{ 'calendario.subtitle' | translate }}</p>

    <div class="flex-1 bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden min-h-[70vh]">
      <iframe
        [src]="calendarUrl"
        class="calendario-iframe"
        [attr.title]="'calendario.iframeTitle' | translate"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
    </div>
  </div>
</div>

<app-boton-atras></app-boton-atras>
