<div class="w-full min-h-screen bg-slate-50 p-4 sm:p-6 lg:p-8 flex flex-col">
  <div class="max-w-6xl mx-auto w-full flex flex-col flex-1">
    <div class="mb-6 text-center">
      <h1 class="text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-violet-600 to-indigo-600 tracking-tight mb-3">
        {{ 'calendario.title' | translate }}
      </h1>
      <p class="text-gray-500 text-lg font-medium">{{ 'calendario.subtitle' | translate }}</p>
    </div>

    <div class="flex-1 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden min-h-[70vh]">
      <iframe
        [src]="calendarUrl"
        class="calendario-iframe"
        [attr.title]="'calendario.iframeTitle' | translate"
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
    </div>
  </div>

  <app-boton-atras></app-boton-atras>
</div>
