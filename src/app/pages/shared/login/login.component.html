<div class="w-full h-full flex justify-center items-center bg-white relative overflow-hidden font-sans py-12">
    
    <div class="relative bg-purple-100/80 backdrop-blur-xl rounded-[2rem] shadow-[0_20px_60px_-15px_rgba(88,28,135,0.15)] w-full max-w-md p-10 border border-purple-200 mx-4 z-10">
        
        <div class="text-center mb-10">
            <div class="inline-block p-4 rounded-2xl bg-purple-800 shadow-lg shadow-purple-900/20 mb-4 transform transition hover:scale-105 duration-300">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </div>
            <h1 class="text-4xl font-extrabold text-purple-950 tracking-tight mb-1">
                Ziryab
            </h1>
            <p class="text-purple-800 font-bold text-xs tracking-widest uppercase opacity-80">Plataforma Educativa</p>
        </div>

        <!-- Formulario -->
        <form [formGroup]="formLogin" (ngSubmit)="onSubmit()" class="space-y-6">
            
            <!-- Campo Email -->
            <div class="group">
                <label class="block text-xs font-bold text-purple-900/70 tracking-wide uppercase mb-2 ml-1 group-focus-within:text-purple-800 transition-colors" for="email">Correo Electrónico</label>
                <div class="relative transition-all duration-300 transform group-focus-within:-translate-y-1">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-purple-500 group-focus-within:text-purple-700 transition-colors duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207" />
                        </svg>
                    </div>
                    <input 
                        id="email" 
                        type="text" 
                        formControlName="email"
                        autocomplete="username"
                        placeholder="ejemplo@ziryab.es"
                        class="w-full pl-11 pr-4 py-4 rounded-xl border-2 border-purple-200 bg-white/95 text-purple-900 placeholder-purple-400 font-medium focus:bg-white focus:border-purple-600 focus:ring-4 focus:ring-purple-800/20 outline-none transition-all duration-300 shadow-sm"
                    />
                </div>
            </div>

            <!-- Campo Contraseña -->
            <div class="group">
                <div class="flex justify-between items-center mb-2 ml-1">
                    <label class="text-xs font-bold text-purple-900/70 tracking-wide uppercase group-focus-within:text-purple-800 transition-colors" for="password">Contraseña</label>
                </div>
                <div class="relative transition-all duration-300 transform group-focus-within:-translate-y-1">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-purple-500 group-focus-within:text-purple-700 transition-colors duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </div>
                    <input 
                        id="password" 
                        type="password" 
                        formControlName="password"
                        autocomplete="current-password"
                        placeholder="•••••••••••••••••••••"
                        class="w-full pl-11 pr-10 py-4 rounded-xl border-2 border-purple-200 bg-white/95 text-purple-900 placeholder-purple-400 font-medium focus:bg-white focus:border-purple-600 focus:ring-4 focus:ring-purple-800/20 outline-none transition-all duration-300 shadow-sm"
                    />
                    <div class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer hover:text-purple-800 transition-colors text-purple-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Botón Acceder -->
            <button 
                type="submit"
                class="w-full py-4 px-6 bg-purple-700 hover:bg-purple-800 text-white font-bold rounded-xl shadow-lg hover:shadow-purple-900/40 transform hover:-translate-y-1 transition-all duration-300 focus:outline-none focus:ring-4 focus:ring-purple-500/40 mt-6 tracking-wide text-lg border border-purple-600/20">
                Iniciar Sesión
            </button>

        </form>

    </div>
</div>
