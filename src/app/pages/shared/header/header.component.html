<header class="sticky top-0 z-50 w-full bg-purple-300">

    <div class="w-full px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-24">

            <div class="  mr-3 md:pl-2">
                <app-selector-idioma></app-selector-idioma>
            </div>

            <div class="flex-grow text-left md:text-center">
                <h1
                    class="text-3xl md:text-5xl font-extrabold text-purple-900 tracking-wide font-sans drop-shadow-sm cursor-default">
                    Ziryab
                </h1>
            </div>

            <div class="min-w-fit md:w-[260px] flex justify-end gap-3 items-center">
                <button
                  type="button"
                  class="relative p-2 rounded-2xl border border-white/50 bg-white/40 hover:bg-white/60 transition-colors"
                  [attr.aria-label]="('notifications.bellAria' | translate)"
                  [attr.title]="('notifications.unreadAria' | translate)"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-purple-900" fill="none" viewBox="0 0 24 24"
                      stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                    </svg>
                    @if (unreadBadge()) {
                      <span
                        class="absolute -top-0.5 -right-0.5 min-w-[1.15rem] h-[1.15rem] px-1 rounded-full bg-red-500 text-white text-[10px] font-bold flex items-center justify-center leading-none"
                        aria-live="polite">
                        {{ unreadBadge() }}
                      </span>
                    }
                </button>

                <div (click)="toggleProfileMenu()"
                    class="group flex items-center gap-3 pl-3 pr-2 py-1.5 rounded-2xl cursor-pointer transition-all duration-300
                            bg-white/40 backdrop-blur-sm border border-white/50 hover:bg-white/60 hover:shadow-md">

                    <div class="block text-right mr-1">
                        <h2
                            class="text-purple-900 font-bold text-sm leading-tight truncate max-w-[100px] md:max-w-[140px]">
                            {{ userName }}
                        </h2>
                        <p class="text-purple-800 text-xs font-medium uppercase tracking-wider">
                            {{ userRoleKey | translate }}
                        </p>
                    </div>

                    <div
                        class="h-10 w-10 rounded-full bg-purple-100 flex items-center justify-center text-purple-600 border-2 border-purple-200 shadow-sm group-hover:scale-105 transition-transform duration-300 flex-shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>

                </div>
            </div>
        </div>
    </div>
</header>

@if (toastNotification) {
  <div
    role="alert"
    class="fixed bottom-5 left-1/2 z-[60] max-w-md w-[calc(100%-2rem)] -translate-x-1/2 rounded-xl border border-purple-200 bg-white/95 backdrop-blur-sm shadow-lg p-4 text-left"
    (click)="$event.stopPropagation()"
  >
    <button
      type="button"
      class="absolute top-2 right-2 text-purple-700 hover:text-purple-900 text-xs underline"
      (click)="dismissToast()"
    >
      {{ 'notifications.toastClose' | translate }}
    </button>
    <p class="font-semibold text-purple-900 pr-16">{{ toastNotification.title }}</p>
    <p class="mt-1 text-sm text-purple-800">{{ toastNotification.message }}</p>
  </div>
}
