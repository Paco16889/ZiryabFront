<header class="sticky top-0 z-50 w-full bg-purple-300 dark:bg-purple-950">

    <div class="w-full px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-24">

            <div class="mr-3 md:pl-2 flex items-center gap-2">
                <app-theme-toggle></app-theme-toggle>
                <app-selector-idioma></app-selector-idioma>
            </div>

            <div class="flex-grow flex justify-center items-center">
                <h1
                    (click)="navigateToDashboard()"
                    class="text-3xl md:text-5xl font-extrabold text-purple-900 dark:text-purple-100 tracking-wide font-sans drop-shadow-sm cursor-pointer select-none hover:text-purple-700 dark:hover:text-purple-200 transition-colors duration-200">
                    Ziryab
                </h1>
            </div>

            <div class="relative min-w-fit md:w-[260px] flex justify-end gap-3 items-center">
                <app-notification-badge
                  [count]="notificationService.unreadCount()"
                  [max]="99"
                  [ariaLabel]="'notifications.bellAria' | translate"
                  (badgeClick)="notificationPanel.toggle()"
                />
                <app-notification-list />

                <div (click)="toggleProfileMenu()"
                    class="group flex items-center gap-3 pl-3 pr-2 py-1.5 rounded-2xl cursor-pointer transition-all duration-300
                            bg-white/40 backdrop-blur-sm border border-white/50 hover:bg-white/60 hover:shadow-md
                            dark:bg-purple-900/50 dark:border-purple-700 dark:hover:bg-purple-800/60">

                    <div class="block text-right mr-1">
                        <h2
                            class="text-purple-900 dark:text-purple-100 font-bold text-sm leading-tight truncate max-w-[100px] md:max-w-[140px]">
                            {{ userName || ('sharedPages.header.defaultUser' | translate) }}
                        </h2>
                        <p class="text-purple-800 dark:text-purple-200 text-xs font-medium uppercase tracking-wider">
                            {{ userRoleKey | translate }}
                        </p>
                    </div>

                    <div
                        class="h-10 w-10 rounded-full bg-purple-100 dark:bg-purple-800 flex items-center justify-center text-purple-600 dark:text-purple-200 border-2 border-purple-200 dark:border-purple-600 shadow-sm group-hover:scale-105 transition-transform duration-300 flex-shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>

                </div>
            </div>
        </div>
    </div>
</header>

@if (toastNotification) {
  <div
    role="alert"
    class="fixed bottom-5 left-1/2 z-[60] max-w-md w-[calc(100%-2rem)] -translate-x-1/2 rounded-xl border border-purple-200 dark:border-purple-700 bg-white/95 dark:bg-gray-900/95 backdrop-blur-sm shadow-lg p-4 text-left"
    (click)="$event.stopPropagation()"
  >
    <button
      type="button"
      class="absolute top-2 right-2 text-purple-700 dark:text-purple-300 hover:text-purple-900 dark:hover:text-purple-100 text-xs underline"
      (click)="dismissToast()"
    >
      {{ 'notifications.toastClose' | translate }}
    </button>
    <p class="font-semibold text-purple-900 dark:text-purple-100 pr-16">{{ toastNotification.title }}</p>
    <p class="mt-1 text-sm text-purple-800 dark:text-purple-200">{{ toastNotification.message }}</p>
  </div>
}
