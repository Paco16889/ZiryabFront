<header class="sticky top-0 z-50 w-full overflow-visible bg-purple-300">

    <div class="w-full px-4 sm:px-8 lg:px-10 py-2.5 sm:py-3 overflow-visible">
        <div
            class="grid w-full min-h-[5rem] sm:min-h-[7rem] grid-cols-[1fr_auto_1fr] items-center gap-2 sm:gap-4 overflow-visible">

            <div class="flex items-center gap-1.5 sm:gap-2 justify-self-start min-w-0 pl-1 sm:pl-2">
                @if (showThemeToggle) {
                    <app-theme-toggle></app-theme-toggle>
                }
                <app-selector-idioma></app-selector-idioma>
            </div>

            <h1
                (click)="navigateToDashboard()"
                class="justify-self-center whitespace-nowrap overflow-visible
                       text-2xl sm:text-3xl md:text-5xl font-extrabold text-purple-900 tracking-wide font-sans
                       drop-shadow-sm select-none transition-colors duration-200
                       leading-tight px-1"
                [ngClass]="{ 'cursor-pointer hover:text-purple-700': !isAdmin }">
                Ziryab
            </h1>

            <div
                class="relative flex items-center gap-2 sm:gap-3 justify-self-end min-w-0 rounded-2xl px-2 sm:px-3 py-1.5
                       bg-white/40 backdrop-blur-sm border border-white/50">

                <app-notification-badge
                  [count]="notificationsService.unreadCount()"
                  [max]="99"
                  [ariaLabel]="'notifications.bellAria' | translate"
                  (badgeClick)="notificationPanel.toggle()"
                />
                <app-notification-list />

                <div
                    (click)="toggleProfileMenu()"
                    class="group flex items-center gap-2 cursor-pointer shrink-0
                           border-l border-white/60 pl-2 sm:pl-3 ml-0.5 sm:ml-1">

                    <div class="hidden sm:block text-right min-w-0 max-w-[100px] md:max-w-[140px]">
                        <h2 class="text-purple-900 font-bold text-sm leading-tight truncate">
                            {{ userName || ('sharedPages.header.defaultUser' | translate) }}
                        </h2>
                        <p class="text-purple-800 text-xs font-medium uppercase tracking-wider truncate">
                            {{ userRoleKey | translate }}
                        </p>
                    </div>

                    <div
                        class="h-9 w-9 sm:h-10 sm:w-10 rounded-full bg-purple-100 flex items-center justify-center
                               text-purple-600 border-2 border-purple-200 shadow-sm
                               group-hover:scale-105 transition-transform duration-300 flex-shrink-0">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>

@if (toastNotification) {
  <div
    role="alert"
    class="fixed bottom-5 left-1/2 z-[60] max-w-md w-[calc(100%-2rem)] -translate-x-1/2 rounded-xl border border-purple-200 bg-white/95 backdrop-blur-sm shadow-lg p-4 text-left"
    (click)="$event.stopPropagation()"
  >
    <button
      type="button"
      class="absolute top-2 right-2 text-purple-700 hover:text-purple-900 text-xs underline"
      (click)="dismissToast()"
    >
      {{ 'notifications.toastClose' | translate }}
    </button>
    <p class="font-semibold text-purple-900 pr-16">{{ toastNotification.title }}</p>
    <p class="mt-1 text-sm text-purple-800">{{ toastNotification.message }}</p>
  </div>
}
