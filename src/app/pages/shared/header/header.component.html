<header class="w-full bg-gradient-to-r from-purple-300 via-purple-300 to-purple-200 p-4 md:p-6 shadow-md flex justify-between items-center">
    
    <div class="pl-2"> 
      <app-selector-idioma></app-selector-idioma>
    </div>
  
    <h1 class="text-3xl md:text-4xl font-extrabold text-purple-800 tracking-wide font-sans">
    Ziryab
  </h1>

  <div (click)="toggleProfileMenu()" 
        class="flex items-center bg-purple-50 rounded-xl p-2 md:p-3 shadow-inner cursor-pointer hover:shadow-lg transition duration-200 ml-4">
    
    <div class="text-right mr-3">
      <h2 class="text-purple-700 font-semibold text-lg">{{ userName }}</h2>
      <p class="text-purple-500 text-sm">{{ userRole }}</p>
    </div>

    <span class="flex-shrink-0 bg-purple-200 text-purple-600 rounded-full p-2 md:p-3">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
      </svg>
    </span>
  </div>
</header>
