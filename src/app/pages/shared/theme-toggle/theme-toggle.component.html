<button
  type="button"
  class="flex h-8 w-8 md:h-10 md:w-10 items-center justify-center rounded-lg border border-purple-300/60 bg-white/50 text-purple-900 shadow-sm transition-all duration-200 hover:bg-white/80 hover:shadow-md focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-purple-600 focus-visible:ring-offset-2 focus-visible:ring-offset-purple-200"
  [attr.aria-label]="
    (themeService.activeTheme() === 'light' ? 'theme.toggleToDark' : 'theme.toggleToLight')
      | translate
  "
  [attr.title]="
    (themeService.activeTheme() === 'light' ? 'theme.toggleToDark' : 'theme.toggleToLight')
      | translate
  "
  [attr.aria-pressed]="themeService.activeTheme() === 'dark'"
  (click)="onToggle()"
>
  @if (themeService.activeTheme() === 'light') {
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="h-5 w-5 md:h-6 md:w-6"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="2"
      aria-hidden="true"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"
      />
    </svg>
  } @else {
    <svg
      xmlns="http://www.w3.org/2000/svg"
      class="h-5 w-5 md:h-6 md:w-6"
      fill="none"
      viewBox="0 0 24 24"
      stroke="currentColor"
      stroke-width="2"
      aria-hidden="true"
    >
      <path
        stroke-linecap="round"
        stroke-linejoin="round"
        d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"
      />
    </svg>
  }
</button>
