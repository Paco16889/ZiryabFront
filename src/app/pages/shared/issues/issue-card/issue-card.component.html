<article class="rounded-xl border border-gray-200 bg-white p-4 shadow-sm hover:shadow-md transition-shadow">
  <div class="flex items-start justify-between gap-3">
    <div class="flex-1 min-w-0">
      <div class="flex flex-wrap items-center gap-2 mb-2">
        <h3 class="text-base font-semibold text-gray-900 truncate">{{ issue().title }}</h3>
        <span
          class="inline-flex items-center rounded-full bg-blue-50 px-2.5 py-0.5 text-xs font-medium text-blue-700"
        >
          {{ audienceKey(issue().audience) | translate }}
        </span>
      </div>

      <p class="text-sm text-gray-600 line-clamp-3 whitespace-pre-line">{{ issue().body }}</p>

      <div class="mt-3 flex flex-wrap gap-x-4 gap-y-1 text-xs text-gray-500">
        <span>
          {{ 'lists.issues.emitter' | translate }}:
          {{ emitterLabel() | translate: { id: issue().emitterId } }}
        </span>
        <span>{{ issue().createdAt | date: 'short' }}</span>
      </div>
    </div>

    @if (canManage()) {
      <div class="relative flex-shrink-0">
        <button
          type="button"
          class="p-2 rounded-lg text-gray-500 hover:bg-gray-100 hover:text-gray-700"
          (click)="toggleMenu($event)"
          [attr.aria-label]="'common.buttons.edit' | translate"
        >
          ⋮
        </button>

        @if (menuOpen()) {
          <div
            class="absolute right-0 top-full mt-1 w-36 rounded-lg border border-gray-200 bg-white py-1 shadow-lg z-10"
            (click)="$event.stopPropagation()"
          >
            <button
              type="button"
              class="w-full px-3 py-2 text-left text-sm text-gray-700 hover:bg-gray-50"
              (click)="onEdit()"
            >
              {{ 'common.buttons.edit' | translate }}
            </button>
            <button
              type="button"
              class="w-full px-3 py-2 text-left text-sm text-red-600 hover:bg-red-50"
              (click)="onDelete()"
            >
              {{ 'common.buttons.delete' | translate }}
            </button>
          </div>
        }
      </div>
    }
  </div>
</article>
