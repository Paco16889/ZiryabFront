# Formato de commits — proyecto Ziryab
# El hook validate-commit.sh y la rule jira-integration.mdc leen esta config.

# Preferido (opción C): clave Jira entre corchetes
PREFERRED_EXAMPLE="[CURSO-59] servicios http assignments"
PREFERRED_REGEX='^\[[A-Z]+-[0-9]+\][[:space:]]+.+'

# Alternativo (Conventional Commits + Jira, histórico CURSO-3) — sigue siendo válido
ALT_EXAMPLE="feat(CURSO-59): servicios http assignments"
ALT_REGEX='^(feat|fix|refactor|docs|style|test|chore|perf|build|ci)\([A-Z]+-[0-9]+\):[[:space:]]+.+'
